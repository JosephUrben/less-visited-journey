<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#153b34" />
  <meta name="description" content="A private, offline-friendly Less Visited travel companion." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
  <title>Less Visited Journey</title>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="app-header">
    <div class="brand-lockup">
      <div class="brand-mark" aria-hidden="true">LV</div>
      <div>
        <p class="eyebrow">LESS VISITED</p>
        <h1 id="app-title">Journey</h1>
      </div>
    </div>
    <button id="install-button" class="button button--compact" type="button" hidden>Install</button>
  </header>

  <div id="network-status" class="network-status" role="status" aria-live="polite"></div>
  <div id="demo-warning" class="demo-warning" hidden></div>

  <main id="main" class="app-main" tabindex="-1">
    <section id="view-today" class="view is-active" data-view="today" aria-labelledby="today-heading"></section>
    <section id="view-journey" class="view" data-view="journey" aria-labelledby="journey-heading"></section>
    <section id="view-places" class="view" data-view="places" aria-labelledby="places-heading"></section>
    <section id="view-saved" class="view" data-view="saved" aria-labelledby="saved-heading"></section>
    <section id="view-info" class="view" data-view="info" aria-labelledby="info-heading"></section>
  </main>

  <nav class="bottom-nav" aria-label="Primary navigation">
    <button class="nav-item is-active" type="button" data-target="today" aria-current="page">
      <span aria-hidden="true">◉</span><span>Today</span>
    </button>
    <button class="nav-item" type="button" data-target="journey">
      <span aria-hidden="true">▤</span><span>Journey</span>
    </button>
    <button class="nav-item" type="button" data-target="places">
      <span aria-hidden="true">⌖</span><span>Places</span>
    </button>
    <button class="nav-item" type="button" data-target="saved">
      <span aria-hidden="true">♡</span><span>Saved</span>
    </button>
    <button class="nav-item" type="button" data-target="info">
      <span aria-hidden="true">i</span><span>Info</span>
    </button>
  </nav>

  <template id="activity-template">
    <article class="activity-card">
      <div class="activity-card__topline">
        <span class="activity-card__time"></span>
        <span class="category-chip"></span>
      </div>
      <h3 class="activity-card__title"></h3>
      <p class="activity-card__description"></p>
      <dl class="activity-meta"></dl>
      <div class="activity-actions">
        <button class="icon-button save-button" type="button" aria-label="Save activity">♡ Save</button>
        <button class="icon-button complete-button" type="button">✓ Done</button>
        <a class="icon-button map-button" target="_blank" rel="noopener noreferrer">↗ Map</a>
      </div>
      <label class="notes-field">
        <span>Personal note</span>
        <textarea rows="2" placeholder="Add a note for this trip…"></textarea>
      </label>
    </article>
  </template>

  <script src="./app.js" type="module"></script>
</body>
</html>
