name: Deploy Less Visited PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check source JavaScript syntax
        run: |
          node --check app.js
          node --check bootstrap.js
          node --check journey-data-patch.js
          node --check journey-v4-patch.js
          node --check product-v5.js
          node --check sw.js
          node --check scripts/build-site.mjs
          node --check scripts/validate-journeys.mjs
      - name: Validate journey data
        run: node scripts/validate-journeys.mjs
      - name: Build site
        run: node scripts/build-site.mjs
      - name: Check production bundle
        run: |
          node --check dist/app.js
          node --check dist/product-v5.js
          node --check dist/sw.js
          grep -q 'lessvisited:viewrendered' dist/app.js
          grep -q 'product-v5.js' dist/index.html
          if grep -q 'product-v4.js\|enhancements.js\|approval-integration.js\|navigation-recovery.js' dist/index.html; then exit 1; fi

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build site
        run: node scripts/build-site.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4