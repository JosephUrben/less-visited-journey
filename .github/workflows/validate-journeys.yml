name: Validate journey JSON

on:
  pull_request:
    paths:
      - "data/**/*.json"
      - "scripts/validate-journeys.mjs"
      - "schemas/journey.schema.json"
  push:
    branches-ignore: ["main"]
    paths:
      - "data/**/*.json"
      - "scripts/validate-journeys.mjs"
      - "schemas/journey.schema.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-journeys.mjs
